<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMACA System</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>🧬 TMACA System Dashboard</h2>

<div class="grid">

<div class="panel">
<h3>Controls</h3>
<button onclick="TMACA.generate()">Generate</button>
<button onclick="TMACA.cycle()">Validate + Repair</button>
<button onclick="TMACA.reset()">Reset</button>
</div>

<div class="panel">
<h3>Episode</h3>
<pre id="episode"></pre>
</div>

<div class="panel">
<h3>Validation</h3>
<pre id="validation"></pre>
</div>

<div class="panel">
<h3>Dataset</h3>
<pre id="dataset"></pre>
</div>

<div class="panel">
<h3>Diagnostics</h3>
<pre id="diagnostics"></pre>
</div>

<div class="panel">
<h3>Drift</h3>
<pre id="drift"></pre>
</div>

<div class="panel full">
<h3>Repair History</h3>
<pre id="repairs"></pre>
</div>

<div class="panel full">
<h3>Event Log</h3>
<pre id="log"></pre>
</div>

</div>

<script src="store.js"></script>
<script src="schema.js"></script>
<script src="validator.js"></script>
<script src="engine.js"></script>

</body>
</html>
