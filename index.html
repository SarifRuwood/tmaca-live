<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMACA System</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>🧬 TMACA System Dashboard</h2>

<div class="grid">

<div class="panel">
<h3>Controls</h3>
<button onclick="TMACA.generate()">Generate</button>
<button onclick="TMACA.cycle()">Validate + Repair</button>
<button onclick="TMACA.repairAllInvalidRecords()">Repair All Invalid</button>
<button onclick="TMACA.reset()">Reset</button>
<button onclick="TMACA.loadScrapedDataset()">Load Scraped Dataset</button>
<button onclick="TMACA.resetToScrapedDataset()">Reset To Scraped Dataset</button>
<button onclick="TMACA.loadStaticDataset()">Load Static Dataset</button>
<button onclick="TMACA.resetToStaticDataset()">Reset To Static Dataset</button>
<button onclick="TMACA.exportCurrentDataset()">Export Current Dataset</button>
<button onclick="TMACA.promptImportDataset()">Import Dataset</button>
<input id="datasetImportInput" type="file" accept=".json" style="display:none" onchange="TMACA.importDataset(event)">
</div>

<div class="panel">
<h3>Episode</h3>
<pre id="episode"></pre>
</div>

<div class="panel">
<h3>Validation</h3>
<pre id="validation"></pre>
</div>

<div class="panel">
<h3>Dataset</h3>
<pre id="dataset"></pre>
</div>

<div class="panel">
<h3>Inspect Record</h3>
<label>Record #: <input id="recordIndex" type="number" min="1" value="1" style="width: 4rem"></label>
<button onclick="TMACA.selectRecord()">Load</button>
<button onclick="TMACA.repairSelectedRecord()">Repair Selected</button>
</div>

<div class="panel">
<h3>Browser</h3>
<label>Show: <select id="recordFilter" onchange="TMACA.setRecordFilter()">
  <option value="all">All</option>
  <option value="valid">Valid</option>
  <option value="invalid">Invalid</option>
  <option value="repaired">Repaired</option>
  <option value="repair_failed">Repair Failed</option>
</select></label>
<button onclick="TMACA.refreshRecords()">Refresh</button>
</div>

<div class="panel full">
<h3>Record Browser</h3>
<pre id="recordBrowser"></pre>
</div>

<div class="panel">
<h3>Diagnostics</h3>
<pre id="diagnostics"></pre>
</div>

<div class="panel">
<h3>Drift</h3>
<pre id="drift"></pre>
</div>

<div class="panel full">
<h3>Selected Record</h3>
<pre id="record"></pre>
</div>

<div class="panel full">
<h3>Selected Record Editor</h3>
<textarea id="recordEditor" rows="12" style="width: 100%; font-family: monospace;"></textarea>
<button onclick="TMACA.saveRecordEdit()">Save Edited Record</button>
</div>

<div class="panel full">
<h3>Repair History</h3>
<pre id="repairs"></pre>
</div>

<div class="panel full">
<h3>Event Log</h3>
<pre id="log"></pre>
</div>

</div>

<script src="store.js"></script>
<script src="schema.js"></script>
<script src="validator.js"></script>
<script src="engine.js"></script>

</body>
</html>
